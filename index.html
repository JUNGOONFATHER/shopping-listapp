<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row button {
      padding: 10px 18px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #5a67d8;
    }

    .input-row button:disabled {
      background: #a0aec0;
      cursor: not-allowed;
    }

    .stats {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 12px;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 8px;
      border-bottom: 1px solid #f0f4f8;
      transition: background 0.15s;
      border-radius: 6px;
    }

    li:hover {
      background: #f7fafc;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #667eea;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-word;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #fc8181;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .clear-btn {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 9px;
      background: none;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      color: #718096;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover {
      background: #fff5f5;
      border-color: #fc8181;
      color: #e53e3e;
    }

    .loading {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .error-msg {
      color: #e53e3e;
      font-size: 0.85rem;
      margin-bottom: 12px;
      padding: 8px 12px;
      background: #fff5f5;
      border-radius: 6px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>쇼핑 리스트</h1>
    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." />
      <button id="addBtn" onclick="addItem()">추가</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="stats" id="stats"></div>
    <div class="loading" id="loading">불러오는 중...</div>
    <ul id="list"></ul>
    <div class="empty" id="empty" style="display:none">아이템을 추가해 보세요!</div>
    <button class="clear-btn" onclick="clearChecked()">완료 항목 삭제</button>
  </div>

  <script>
    const SUPABASE_URL = 'https://eqiybxksdfzfmrijglfy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxaXlieGtzZGZ6Zm1yaWpnbGZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NjczNDUsImV4cCI6MjA5MTE0MzM0NX0.W9tbjaowLTKEsl2fWKtPnNMvghOLJms3Ku7pj6ek9ZI';
    const API = `${SUPABASE_URL}/rest/v1/shopping_items`;
    const HEADERS = {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };

    let items = [];

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 4000);
    }

    async function fetchItems() {
      try {
        const res = await fetch(`${API}?order=created_at.asc`, { headers: HEADERS });
        if (!res.ok) throw new Error(await res.text());
        items = await res.json();
      } catch (e) {
        showError('데이터 로딩 실패: ' + e.message);
        items = [];
      }
      document.getElementById('loading').style.display = 'none';
      render();
    }

    function render() {
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      const stats = document.getElementById('stats');

      list.innerHTML = '';
      const total = items.length;
      const done = items.filter(i => i.checked).length;

      if (total === 0) {
        empty.style.display = 'block';
        stats.textContent = '';
      } else {
        empty.style.display = 'none';
        stats.textContent = `${done} / ${total} 완료`;
      }

      items.forEach((item) => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        li.innerHTML = `
          <input type="checkbox" ${item.checked ? 'checked' : ''} onclick="toggle('${item.id}', this.checked)" />
          <span class="item-text">${escapeHtml(item.text)}</span>
          <button class="delete-btn" onclick="remove('${item.id}')" title="삭제">✕</button>
        `;
        list.appendChild(li);
      });
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function addItem() {
      const input = document.getElementById('itemInput');
      const text = input.value.trim();
      if (!text) return;

      const btn = document.getElementById('addBtn');
      btn.disabled = true;

      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: HEADERS,
          body: JSON.stringify({ text, checked: false })
        });
        if (!res.ok) throw new Error(await res.text());
        const [newItem] = await res.json();
        items.push(newItem);
        input.value = '';
        input.focus();
        render();
      } catch (e) {
        showError('추가 실패: ' + e.message);
      } finally {
        btn.disabled = false;
      }
    }

    async function toggle(id, newChecked) {
      try {
        const res = await fetch(`${API}?id=eq.${id}`, {
          method: 'PATCH',
          headers: HEADERS,
          body: JSON.stringify({ checked: newChecked })
        });
        if (!res.ok) throw new Error(await res.text());
        const idx = items.findIndex(i => i.id === id);
        if (idx !== -1) items[idx].checked = newChecked;
        render();
      } catch (e) {
        showError('업데이트 실패: ' + e.message);
        render();
      }
    }

    async function remove(id) {
      try {
        const res = await fetch(`${API}?id=eq.${id}`, {
          method: 'DELETE',
          headers: HEADERS
        });
        if (!res.ok) throw new Error(await res.text());
        items = items.filter(i => i.id !== id);
        render();
      } catch (e) {
        showError('삭제 실패: ' + e.message);
      }
    }

    async function clearChecked() {
      const checkedIds = items.filter(i => i.checked).map(i => i.id);
      if (checkedIds.length === 0) return;

      try {
        const res = await fetch(`${API}?id=in.(${checkedIds.join(',')})`, {
          method: 'DELETE',
          headers: HEADERS
        });
        if (!res.ok) throw new Error(await res.text());
        items = items.filter(i => !i.checked);
        render();
      } catch (e) {
        showError('삭제 실패: ' + e.message);
      }
    }

    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    fetchItems();
  </script>
</body>
</html>
